# picom configuration
# https://picom.app/

# Shadows
shadow = true;
shadow-radius = 5;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-opacity = 0.2;

# Backend and rendering
backend = "xrender";
vsync = true;         # prevent screen tearing
use-damage = true;    # only redraw changed parts of the screen

# Window grouping and opacity
detect-rounded-corners = true;
detect-client-opacity = true;  # respect opacity set by the WM
detect-transient = true;       # group transient windows with their parent
